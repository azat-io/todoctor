name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest

    strategy:
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest]
        arch: [x64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Tools
        uses: ./.github/actions/install-tools

      - name: Install Windows Build Tools using Winget
        if: runner.os == 'Windows'
        run: |
          if (systeminfo | findstr /B /C:"OS Name" | findstr "Windows 10") {
            winget install Microsoft.VisualStudio.2022.BuildTools --force --override "--wait --passive --add Microsoft.VisualStudio.Component.VC.Tools.x86.x64 --add Microsoft.VisualStudio.Component.Windows10SDK"
          } else {
            winget install Microsoft.VisualStudio.2022.BuildTools --force --override "--wait --passive --add Microsoft.VisualStudio.Component.VC.Tools.x86.x64 --add Microsoft.VisualStudio.Component.Windows11SDK.22621"
          }

      - name: Install Cross
        run: cargo install cross --locked

      - name: Add Necessary Rust Targets
        run: |
          if [[ "${{ matrix.platform }}" == "ubuntu-latest" ]]; then
            rustup target add x86_64-unknown-linux-gnu
            rustup target add aarch64-unknown-linux-gnu
          elif [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            rustup target add x86_64-pc-windows-msvc
            rustup target add aarch64-pc-windows-msvc
          elif [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            rustup target add x86_64-apple-darwin
            rustup target add aarch64-apple-darwin
          fi

      - name: Build Binaries
        run: |
          if [[ "${{ matrix.platform }}" == "ubuntu-latest" ]]; then
            if [[ "${{ matrix.arch }}" == "x64" ]]; then
              cross build --release --target x86_64-unknown-linux-gnu
            elif [[ "${{ matrix.arch }}" == "arm64" ]]; then
              cross build --release --target aarch64-unknown-linux-gnu
            fi
          elif [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            if [[ "${{ matrix.arch }}" == "x64" ]]; then
              cargo build --release --target x86_64-pc-windows-msvc
            elif [[ "${{ matrix.arch }}" == "arm64" ]]; then
              cargo build --release --target aarch64-pc-windows-msvc
            fi
          elif [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            if [[ "${{ matrix.arch }}" == "x64" ]]; then
              cargo build --release --target x86_64-apple-darwin
            elif [[ "${{ matrix.arch }}" == "arm64" ]]; then
              cargo build --release --target aarch64-apple-darwin
            fi
          fi

      - name: Move Binaries to Bin Folder
        run: |
          mkdir -p ./bin/${{ matrix.platform }}/${{ matrix.arch }}
          cp target/release/todoctor ./bin/${{ matrix.platform }}/${{ matrix.arch }}/todoctor

      - name: Upload Binaries
        uses: actions/upload-artifact@v3
        with:
          name: todoctor-${{ matrix.platform }}-${{ matrix.arch }}
          path: ./bin/${{ matrix.platform }}/${{ matrix.arch }}/todoctor

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build-binaries

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Tools
        uses: ./.github/actions/install-tools

      - name: Install Dependencies
        run: pnpm install

      - name: Build Static Assets
        run: pnpm run build:preview

      - name: Download Binaries
        uses: actions/download-artifact@v3
        with:
          name: todoctor-${{ matrix.platform }}-${{ matrix.arch }}
          path: ./bin/${{ matrix.platform }}/${{ matrix.arch }}/

      - name: Create GitHub Release
        run: pnpm run ci:changelog
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

      - name: Configure NPM Auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NODE_AUTH_TOKEN }}" > ~/.npmrc

      - name: Clear Package JSON
        run: pnpm run ci:clear

      - name: Publish to NPM
        run: pnpm run ci:publish
